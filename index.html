.hdr-stat{margin-left:auto;font-size:.78rem;color:var(--tx3);display:flex;align-items:center;gap:6px}

.nb{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-size:.95rem;font-family:inherit;cursor:pointer;padding:14px 20px;transition:all .2s}

/* CONTENT */

.fg{display:flex;flex-direction:column;gap:14px}
.fl{font-size:.8rem;color:var(--tx2);margin-bottom:5px;display:block}
.fi{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}

.deriv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

["Œªsor","…êÃÉso…æ","verbo","Sentir (f√≠sico ou emocional)"],
["kilŒµr","kil…õ…æ","verbo","Rir"],["flŒµrur","fl…õ…æu…æ","verbo","Chorar"],
["fentolir","fentoli…æ","verbo","Agradecer"],
["pont…îr","pont…î…æ","verbo","Semear"],
];

// ‚îÄ‚îÄ PERSIST√äNCIA ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const LS_KEY='maniDict_v1';
let D=[];

function loadData(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){D=JSON.parse(raw);return;}
  }catch(e){}
  D=[...BASE_DATA];
  saveLS();
}
function saveLS(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(D));}catch(e){}
}

// ‚îÄ‚îÄ NORMALIZA√á√ÉO ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function nn(s){
  return s.toLowerCase()
    .replace(/[Œª]/g,'a').replace(/[…õŒµ]/g,'e').replace(/[…î]/g,'o')
    .replace(/[·Éó]/g,'ch').replace(/[·π´]/g,'th').replace(/[·É∞]/g,'ks')
    .replace(/[·ÉÝ]/g,'r').replace(/…êÃÉ/g,'a').replace(/[ í]/g,'j')
    .replace(/[ Å]/g,'r').replace(/[ É]/g,'ch').replace(/[Œ∏]/g,'th')
    .replace(/[…ê]/g,'a').replace(/[…æ]/g,'r');
}
function sortD(){D.sort((a,b)=>nn(a[0]).localeCompare(nn(b[0]),'pt'));}
function firstChar(w){return nn(w)[0].toUpperCase();}
function updateHeaderCount(){
  const el=document.getElementById('total-count');
  if(el)el.textContent=D.length;
}

// ‚îÄ‚îÄ DERIVA√á√ÉO ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function getBase(word,type){
  return type==='verbo'?word.replace(/r$/,''):word;
}
function buildDerivs(word,trans,type,ipa){
  const b=getBase(word,type);
  const bi=ipa?getBase(ipa,type):'';
  const entries=[];
  if(document.getElementById('d-noma').checked)
    entries.push([b+'noma',bi?bi+'noma':'','substantivo','Conjunto de '+trans.toLowerCase()]);
  if(document.getElementById('d-ti').checked)
    entries.push([b+'·π´i',bi?bi+'Œ∏i':'','substantivo','Conceito de '+trans.toLowerCase()]);
  if(document.getElementById('d-av').checked)
    entries.push([b+'av',bi?bi+'av':'','substantivo','Aquele que '+trans.toLowerCase()]);
  if(document.getElementById('d-lam').checked)
    entries.push([b+'Œª',bi?bi+'…êÃÉ':'','adjetivo','Relativo a '+trans.toLowerCase()]);
  if(document.getElementById('d-isha').checked)
    entries.push([b+'i·É∞a',bi?bi+'iksa':'','adv√©rbio','De modo '+trans.toLowerCase()]);
  return entries;
}

// ‚îÄ‚îÄ PREVIEW ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function livePreview(){
  const w=document.getElementById('f-word').value.trim();
  const t=document.getElementById('f-trans').value.trim();
  const tp=document.getElementById('f-type').value;
  const ip=document.getElementById('f-ipa').value.trim();
  const prev=document.getElementById('preview');
  if(!w||!t||!tp){
    prev.innerHTML='<span style="color:var(--tx3);font-size:.82rem">Preencha os campos obrigat√≥rios‚Ä¶</span>';
    return;
  }
  const all=[[w,ip,tp,t],...buildDerivs(w,t,tp,ip)];
  prev.innerHTML='<div class="prev-title">Entradas a adicionar:</div>'+
    all.map(([pw,pi,pt,pd])=>
      `<span class="prev-chip"><span class="pw">${pw}</span><span class="ps">${pt}</span><span class="pt">${pd}</span></span>`
    ).join('');
}

// ‚îÄ‚îÄ SALVAR ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function saveWord(){
  const w=document.getElementById('f-word').value.trim();
  const t=document.getElementById('f-trans').value.trim();
  const tp=document.getElementById('f-type').value;
  const ip=document.getElementById('f-ipa').value.trim();
  if(!w){toast('Preencha a palavra em Mani.','err');return;}
  if(!t){toast('Preencha a tradu√ß√£o.','err');return;}
  if(!tp){toast('Selecione a classe gramatical.','err');return;}
  const dup=D.find(e=>e[0]===w);
  if(dup){toast(`"${w}" j√° existe no dicion√°rio.`,'err');return;}
  const all=[[w,ip,tp,t],...buildDerivs(w,t,tp,ip)];
  all.forEach(e=>D.push(e));
  sortD();saveLS();updateHeaderCount();
  buildAlpha();renderDict();
  const n=all.length;
  toast(`${n} entrada${n>1?'s':''} adicionada${n>1?'s':''}!`,'ok');
  // Limpar form
  ['f-word','f-trans','f-ipa'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f-type').value='';
  ['d-noma','d-ti','d-av','d-lam','d-isha'].forEach(id=>{document.getElementById(id).checked=false;});
  document.getElementById('preview').innerHTML='<span style="color:var(--tx3);font-size:.82rem">Preencha o formul√°rio para ver‚Ä¶</span>';
}

// ‚îÄ‚îÄ EXPORT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function exportDict(){
  const lines=D.map(e=>`  ${JSON.stringify(e)}`).join(',\n');
  const code=`let D=[\n${lines}\n];`;
  navigator.clipboard.writeText(code).then(()=>toast('C√≥digo JS copiado!','info'))
    .catch(()=>toast('Falha ao copiar.','err'));
}

// ‚îÄ‚îÄ RESET ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function resetDict(){
  if(!confirm('Isso apagar√° todas as entradas personalizadas e restaurar√° o dicion√°rio original. Continuar?'))return;
  D=[...BASE_DATA];
  sortD();saveLS();updateHeaderCount();
  buildAlpha();renderDict();
  toast('Dicion√°rio restaurado para o original.','info');
}

// ‚îÄ‚îÄ TAB SWITCH ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
let currentTab='criar',filt='all',alpha=null;
function sw(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('nb-'+t).classList.add('on');
  if(t==='dictionary'){buildAlpha();renderDict();}
}

// ‚îÄ‚îÄ FILTROS ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
const FILTERS=[['all','Todos'],['verbo','Verbos'],['substantivo','Substantivos'],
  ['adjetivo','Adjetivos'],['numeral','Numerais'],['outros','Outros']];
function buildFilters(){
  document.getElementById('fr').innerHTML=FILTERS.map(([v,l])=>
    `<button class="fb${v===filt?' on':''}" onclick="setFilt(this,'${v}')">${l}</button>`
  ).join('');
}
function setFilt(btn,f){
  filt=f;alpha=null;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildAlpha();renderDict();
}

function getFiltered(){
  const q=(document.getElementById('sr')?.value||'').toLowerCase();
  return D.filter(([w,,t,d])=>{
    if(filt!=='all'&&filt!=='outros'&&t!==filt)return false;
    if(filt==='outros'&&['verbo','substantivo','adjetivo','numeral'].includes(t))return false;
    if(alpha&&firstChar(w)!==alpha)return false;
    if(q){const nw=nn(w);return nw.includes(q)||w.toLowerCase().includes(q)||d.toLowerCase().includes(q);}
    return true;
  });
}

function buildAlpha(){
  const present=new Set(getFiltered().map(e=>firstChar(e[0])));
  const all=[...new Set(D.map(e=>firstChar(e[0])))].sort();
  document.getElementById('an').innerHTML=all.map(c=>
    `<button class="ab${present.has(c)?' has':''}${alpha===c?' sel':''}" onclick="selAlpha('${c}')">${c}</button>`
  ).join('');
}
function selAlpha(c){alpha=alpha===c?null:c;buildAlpha();renderDict();}

// ‚îÄ‚îÄ RENDER DICT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function typeClass(t){
  const m={verbo:'t-verbo',substantivo:'t-substantivo',adjetivo:'t-adjetivo',
    numeral:'t-numeral',pronome:'t-pronome','part√≠cula':'t-part√≠cula',
    'interjei√ß√£o':'t-interjei√ß√£o','conjun√ß√£o':'t-conjun√ß√£o','adv√©rbio':'t-adv√©rbio',
    'determinativo':'t-determinativo','interrogativo':'t-interrogativo'};
  return m[t]||'t-default';
}

function renderDict(){
  const fd=getFiltered();
  const dl=document.getElementById('dl');
  const cc=document.getElementById('dcc');
  if(!dl)return;
  if(cc)cc.textContent=`${fd.length} entrada${fd.length!==1?'s':''} encontrada${fd.length!==1?'s':''}`;
  if(!fd.length){dl.innerHTML='<div class="nr">Nenhuma entrada encontrada.</div>';return;}
  const q=document.getElementById('sr')?.value||'';
  const groups={};
  fd.forEach(e=>{const l=firstChar(e[0]);if(!groups[l])groups[l]=[];groups[l].push(e);});
  dl.innerHTML=Object.keys(groups).sort().map(l=>
    `<div class="as">${!q?`<div class="ah">${l}</div>`:''}<div class="de-list">${
      groups[l].map(([w,ip,t,d])=>{
        const idx=D.findIndex(e=>e[0]===w&&e[2]===t);
        return `<div class="de" id="de-${idx}">
          <span class="ew">${w}</span>
          <span class="ei">[${ip||'‚Äî'}]</span>
          <span class="et ${typeClass(t)}">${t}</span>
          <span class="ed" id="ed-${idx}">${d}</span>
          <div class="de-actions">
            <button class="btn-sm btn-edit" onclick="startEdit(${idx})">‚úé</button>
            <button class="btn-sm btn-del" onclick="delEntry(${idx})">‚úï</button>
          </div>
        </div>`;
      }).join('')}</div></div>`
  ).join('');
}

// ‚îÄ‚îÄ EDI√á√ÉO INLINE ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function startEdit(idx){
  const edEl=document.getElementById('ed-'+idx);
  const deEl=document.getElementById('de-'+idx);
  if(!edEl||!D[idx])return;
  const cur=D[idx][3];
  edEl.innerHTML=`<input class="ed-input" id="ei-${idx}" value="${cur.replace(/"/g,'&quot;')}">`;
  const actionsEl=deEl.querySelector('.de-actions');
  actionsEl.innerHTML=`
    <button class="btn-sm btn-ok" onclick="confirmEdit(${idx})">‚úì</button>
    <button class="btn-sm btn-cancel" onclick="renderDict()">‚úï</button>`;
  const inp=document.getElementById('ei-'+idx);
  inp.focus();inp.select();
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter')confirmEdit(idx);
    if(e.key==='Escape')renderDict();
  });
}
function confirmEdit(idx){
  const inp=document.getElementById('ei-'+idx);
  if(!inp||!D[idx])return;
  const val=inp.value.trim();
  if(!val){toast('A tradu√ß√£o n√£o pode estar vazia.','err');return;}
  D[idx][3]=val;
  saveLS();renderDict();
  toast('Entrada atualizada!','ok');
}

// ‚îÄ‚îÄ DELETE ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function delEntry(idx){
  const w=D[idx]?.[0];
  if(!w)return;
  if(!confirm(`Remover "${w}" do dicion√°rio?`))return;
  D.splice(idx,1);
  saveLS();updateHeaderCount();buildAlpha();renderDict();
  toast(`"${w}" removido.`,'info');
}

// ‚îÄ‚îÄ TOAST ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
let toastTimer=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=`toast toast-${type} show`;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// ‚îÄ‚îÄ INIT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
loadData();sortD();
buildFilters();buildAlpha();renderDict();updateHeaderCount();
</script>
