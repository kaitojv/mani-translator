<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080812;--s1:#10101e;--s2:#171728;--s3:#1f1f38;
  --acc:#8b6bd4;--acc2:#b08cf0;--acc3:#d4b8ff;
  --tx:#e2e2f0;--tx2:#8888aa;--tx3:#444466;
  --bd:#222238;--bd2:#2e2e50;--bd3:#3a3a60;
  --ok:#3a7a5a;--er:#8a3a3a;
}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#080812 0%,#130d24 40%,#0a1030 100%);border-bottom:1px solid var(--bd2);padding:20px 36px;display:flex;align-items:center;gap:16px}
.logo{font-size:2.4rem;font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--acc3) 0%,#80d4ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:.75rem;color:var(--tx2);letter-spacing:.2em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--bd2);border-radius:20px}
.hdr-stat{margin-left:auto;font-size:.78rem;color:var(--tx3);display:flex;align-items:center;gap:6px}
.hdr-stat span{color:var(--acc2);font-weight:700}

/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 36px;display:flex;gap:4px}
.nb{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-size:.95rem;font-family:inherit;cursor:pointer;padding:14px 20px;transition:all .2s}
.nb:hover{color:var(--tx)}
.nb.on{color:var(--acc3);border-bottom-color:var(--acc)}

/* CONTENT */
.content{max-width:1140px;margin:0 auto;padding:32px 36px}
.tab{display:none}.tab.on{display:block}

/* ── CRIAR PALAVRA ── */
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px; position: relative;}
.card-title{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--acc2);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--bd)}

.fg{display:flex;flex-direction:column;gap:14px}
.fl{font-size:.8rem;color:var(--tx2);margin-bottom:5px;display:block}
.fi{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--tx3)}
select.fi option{background:var(--s2)}

.deriv-grid{display:grid;grid-template-columns:1fr;gap:8px}
.cb-wrap{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:border-color .2s}
.cb-wrap:hover{border-color:var(--acc)}
.cb-wrap input{width:15px;height:15px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.cb-wrap .cb-label{font-size:.82rem;color:var(--tx2)}
.cb-wrap .cb-suf{font-size:.78rem;color:var(--acc2);margin-left:auto;font-family:monospace}
.deriv-group { margin-bottom: 15px; }
.deriv-group-title { font-size: 0.7rem; color: var(--tx3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }

.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:9px;font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-save{background:linear-gradient(135deg,var(--acc),#7c4fcc);color:#fff;box-shadow:0 2px 16px rgba(139,107,212,.3)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,107,212,.5)}
.btn-export{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-export:hover{border-color:var(--acc);color:var(--tx)}
.btn-cloud{background:rgba(58,111,168,.2);border:1px solid rgba(58,111,168,.4);color:#7ab0e8; width: 100%; margin-top: 15px;}
.btn-cloud:hover{background:rgba(58,111,168,.35)}
.btn-sm{padding:4px 10px;font-size:.75rem;border-radius:6px;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-edit{background:rgba(139,107,212,.12);border:1px solid rgba(139,107,212,.25);color:var(--acc2)}
.btn-edit:hover{background:rgba(139,107,212,.25);color:var(--acc3)}
.btn-del{background:rgba(138,58,58,.1);border:1px solid rgba(138,58,58,.25);color:#e88080}
.btn-del:hover{background:rgba(138,58,58,.2)}
.btn-ok{background:rgba(58,122,90,.2);border:1px solid rgba(58,122,90,.4);color:#80d4a8}
.btn-ok:hover{background:rgba(58,122,90,.35)}
.btn-cancel{background:rgba(80,80,100,.15);border:1px solid var(--bd);color:var(--tx2)}
.btn-cancel:hover{background:rgba(80,80,100,.3)}

/* Preview */
.preview{min-height:60px}
.prev-title{font-size:.75rem;color:var(--tx3);margin-bottom:10px}
.prev-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--s3);border:1px solid var(--bd2);border-radius:20px;font-size:.82rem;margin:3px}
.prev-chip .pw{color:var(--acc3);font-weight:700}
.prev-chip .pt{color:var(--tx2)}
.prev-chip .ps{font-size:.7rem;color:var(--acc);font-family:monospace}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:10px;font-size:.88rem;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast-ok{background:rgba(58,122,90,.95);border:1px solid rgba(80,180,120,.4);color:#c0f0d8}
.toast-err{background:rgba(138,58,58,.95);border:1px solid rgba(220,100,100,.4);color:#f0c0c0}
.toast-info{background:rgba(58,80,138,.95);border:1px solid rgba(100,140,220,.4);color:#c0d4f8}

/* ── DICIONÁRIO ── */
.dc-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.sr-wrap{position:relative}
.sr-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--tx2);pointer-events:none;font-size:.9rem}
#sr{width:100%;padding:12px 14px 12px 40px;background:var(--s2);border:1px solid var(--bd);border-radius:11px;color:var(--tx);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}
#sr:focus{border-color:var(--acc)}
#sr::placeholder{color:var(--tx2)}
.fr{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:6px 15px;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);border-radius:20px;cursor:pointer;font-size:.83rem;font-family:inherit;transition:all .2s}
.fb:hover{border-color:var(--acc);color:var(--tx)}
.fb.on{background:var(--acc);border-color:var(--acc);color:#fff}

.an{display:flex;flex-wrap:wrap;gap:3px;padding:9px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;margin-bottom:18px}
.ab{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:none;border:none;border-radius:5px;color:var(--tx3);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .15s}
.ab.has{color:var(--acc2)}.ab.has:hover{background:var(--s3);color:var(--tx)}
.ab.sel{background:var(--acc);color:#fff}

.dc-count{font-size:.78rem;color:var(--tx3);margin-bottom:8px}
.as{margin-bottom:20px}
.ah{font-size:1.1rem;font-weight:700;color:var(--acc3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.de-list{display:flex;flex-direction:column;gap:5px}
.de{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color .2s;flex-wrap:wrap}
.de:hover{border-color:var(--bd3)}
.ew{font-size:.95rem;font-weight:700;color:var(--acc3);min-width:120px}
.ei{font-size:.75rem;color:var(--tx3);font-style:italic;min-width:100px}
.et{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.t-verbo{background:rgba(58,111,168,.18);color:#7ab0e8;border:1px solid rgba(58,111,168,.3)}
.t-substantivo{background:rgba(74,153,112,.18);color:#80d4a8;border:1px solid rgba(74,153,112,.3)}
.t-adjetivo{background:rgba(154,74,58,.18);color:#e89a80;border:1px solid rgba(154,74,58,.3)}
.t-numeral{background:rgba(138,122,58,.18);color:#e8d480;border:1px solid rgba(138,122,58,.3)}
.t-pronome{background:rgba(123,58,154,.18);color:#c48ae8;border:1px solid rgba(123,58,154,.3)}
.t-partícula,.t-interrogativo{background:rgba(58,138,154,.18);color:#80c8d4;border:1px solid rgba(58,138,154,.3)}
.t-interjeição{background:rgba(154,100,58,.18);color:#e8b880;border:1px solid rgba(154,100,58,.3)}
.t-conjunção{background:rgba(80,80,120,.18);color:#b0b0e0;border:1px solid rgba(80,80,120,.3)}
.t-advérbio{background:rgba(60,120,80,.18);color:#90d4a8;border:1px solid rgba(60,120,80,.3)}
.t-determinativo{background:rgba(100,60,120,.18);color:#c090e0;border:1px solid rgba(100,60,120,.3)}
.t-default{background:rgba(80,80,100,.18);color:#aaaacc;border:1px solid rgba(80,80,100,.3)}
.ed{font-size:.85rem;color:var(--tx2);flex:1;min-width:140px}
.de-actions{display:flex;gap:5px;margin-left:auto;flex-shrink:0}
.ed-input{flex:1;min-width:140px;padding:4px 9px;background:var(--s3);border:1px solid var(--acc);border-radius:6px;color:var(--tx);font-size:.85rem;font-family:inherit;outline:none}
.nr{text-align:center;padding:40px;color:var(--tx2);font-size:.95rem}

@media(max-width:720px){
  .hdr{padding:14px 18px}.nav{padding:0 14px}.content{padding:18px 14px}
  .cp-grid{grid-template-columns:1fr}.deriv-grid{grid-template-columns:1fr}
  .ew{min-width:90px}.ei{min-width:70px}
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<div id="app">
  <header class="hdr">
    <div style="display:flex;align-items:baseline;gap:10px">
      <div class="logo">Mani</div>
      <div class="logo-sub">Nuvem Ativa</div>
    </div>
    <div class="hdr-stat">Dicionário: <span id="total-count">...</span> entradas</div>
  </header>
  <nav class="nav">
    <button class="nb on" id="nb-criar" onclick="sw('criar')">＋ Criar Palavra</button>
    <button class="nb" id="nb-dictionary" onclick="sw('dictionary')">◉ Dicionário</button>
  </nav>
  <div class="content">

    <section class="tab on" id="tab-criar">
      <div class="cp-grid">
        <div class="card">
          <div class="card-title">Nova Entrada</div>
          <div class="fg">
            <div>
              <label class="fl">Palavra base (Mani) *</label>
              <input class="fi" id="f-word" placeholder="ex: flumak" oninput="updateDerivOptions(); livePreview()">
            </div>
            <div>
              <label class="fl">Tradução (Português) *</label>
              <input class="fi" id="f-trans" placeholder="ex: relógio, instrumento de tempo" oninput="livePreview()">
            </div>
            <div>
              <label class="fl">Classe Gramatical *</label>
              <select class="fi" id="f-type" onchange="updateDerivOptions(); livePreview()">
                <option value="">— selecione —</option>
                <option value="verbo">Verbo</option>
                <option value="substantivo">Substantivo</option>
                <option value="adjetivo">Adjetivo</option>
                <option value="numeral">Numeral</option>
                <option value="pronome">Pronome</option>
                <option value="advérbio">Advérbio</option>
                <option value="conjunção">Conjunção</option>
                <option value="partícula">Partícula</option>
                <option value="determinativo">Determinativo</option>
                <option value="interjeição">Interjeição</option>
                <option value="interrogativo">Interrogativo</option>
              </select>
            </div>
            <div>
              <label class="fl">Pronúncia IPA <span style="color:var(--tx3)">(opcional)</span></label>
              <input class="fi" id="f-ipa" placeholder="ex: fluˈmak" oninput="livePreview()">
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Derivações Automáticas</div>
          <div id="deriv-options-container">
              <span style="color:var(--tx3);font-size:.82rem">Selecione uma classe gramatical para ver as opções...</span>
          </div>

          <div style="margin-top:20px">
            <div class="card-title" style="margin-bottom:12px">Pré-visualização</div>
            <div class="preview" id="preview"><span style="color:var(--tx3);font-size:.82rem">Preencha o formulário para ver…</span></div>
          </div>

          <div class="btn-row" style="margin-top:20px">
            <button class="btn btn-save" onclick="saveWord()">✓ Salvar na Nuvem</button>
          </div>
          
          <div id="migration-box" style="display:none;">
            <button class="btn btn-cloud" onclick="migrateBaseData()">☁️ Migrar Dicionário Base para a Nuvem</button>
          </div>
        </div>
      </div>
    </section>

    <section class="tab" id="tab-dictionary">
      <div class="dc-wrap">
        <div class="sr-wrap">
          <span class="sr-ico">🔍</span>
          <input type="text" id="sr" placeholder="Buscar em Mani ou Português…" oninput="renderDict()">
        </div>
        <div class="fr" id="fr"></div>
      </div>
      <div class="an" id="an"></div>
      <div class="dc-count" id="dcc"></div>
      <div id="dl"></div>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIGURAÇÃO FIREBASE (Substitua as chaves aqui!) ──
const firebaseConfig = {
  apiKey: "AIzaSyCBDH9UqYXcliyiER9L-JUkiJdWuVnOV4M",
  authDomain: "dicionario-mani.firebaseapp.com",
  projectId: "dicionario-mani",
  storageBucket: "dicionario-mani.firebasestorage.app",
  messagingSenderId: "168308043752",
  appId: "1:168308043752:web:b8c45c45152b64ae6cfe5d",
  measurementId: "G-JJJG3WX9CD"
};

// Inicializa o Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── ESTADO E NORMALIZAÇÃO ──
let D = [];

function nn(s){
  return s.toLowerCase()
    .replace(/[λ]/g,'a').replace(/[ɛε]/g,'e').replace(/[ɔ]/g,'o')
    .replace(/[თ]/g,'ch').replace(/[ṫ]/g,'th').replace(/[ჰ]/g,'ks')
    .replace(/[რ]/g,'r').replace(/ɐ̃/g,'a').replace(/[ʒ]/g,'j')
    .replace(/[ʁ]/g,'r').replace(/[ʃ]/g,'ch').replace(/[θ]/g,'th')
    .replace(/[ɐ]/g,'a').replace(/[ɾ]/g,'r');
}
function sortD(){D.sort((a,b)=>nn(a.word).localeCompare(nn(b.word),'pt'));}
function firstChar(w){return nn(w)[0].toUpperCase();}
function updateHeaderCount(){
  const el=document.getElementById('total-count');
  if(el)el.textContent=D.length;
}
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);

// ── LÓGICA DE DERIVAÇÃO ──
function getBaseForVerb(word) { return word.replace(/r$/,''); }
function getBaseForAdjectiveToVerb(word) {
    return /[aeiouɛɔλɐ]$/i.test(word) ? word+'r' : word+'ar';
}

function buildDerivs(word,trans,type,ipa){
    const entries=[];
    const d = trans.toLowerCase().split(',')[0].split(';')[0].trim(); 
    const ipaBase = ipa ? ipa.replace(/r$/, '') : '';

    if(type === 'verbo') {
        const b = getBaseForVerb(word);
        if(document.getElementById('d-v-adj-res')?.checked)
            entries.push({word: word+'λ', ipa: ipaBase ? ipa+'ẽ' : '', type: 'adjetivo', trans: cap(d)+'; estado resultante'});
        if(document.getElementById('d-v-agente')?.checked)
            entries.push({word: b+'av', ipa: ipaBase ? ipaBase+'av' : '', type: 'substantivo', trans: 'Aquele que '+d});
        if(document.getElementById('d-v-abstrato')?.checked)
            entries.push({word: word+'ṫi', ipa: ipaBase ? ipa+'θi' : '', type: 'substantivo', trans: 'O conceito de '+d});
        if(document.getElementById('d-v-adv-modo')?.checked)
            entries.push({word: word+'iჰa', ipa: ipaBase ? ipa+'iksa' : '', type: 'advérbio', trans: 'De modo: '+d});
    } 
    else if (type === 'adjetivo' || type === 'substantivo') {
        // Lógica Unificada: Substantivos e Adjetivos geram a cadeia verbal da mesma forma
        let verbForm = getBaseForAdjectiveToVerb(word);
        let verbTrans = (type === 'adjetivo') ? 'Tornar-se ' + d : 'Ação associada a ' + d;
        let verbIpa = ipa ? (/[aeiouɛɔλɐ]$/i.test(word) ? ipa+'r' : ipa+'ar') : '';
             
        if(document.getElementById('d-a-verbo')?.checked)
            entries.push({word: verbForm, ipa: verbIpa, type: 'verbo', trans: cap(verbTrans)});
        
        const b = getBaseForVerb(verbForm);

        if(document.getElementById('d-a-adj-res')?.checked)
            entries.push({word: verbForm+'λ', ipa: verbIpa ? verbIpa+'ẽ' : '', type: 'adjetivo', trans: cap(d)+'; estado derivado'});
        if(document.getElementById('d-a-agente')?.checked)
            entries.push({word: b+'av', ipa: verbIpa ? verbIpa.replace(/r$/, '')+'av' : '', type: 'substantivo', trans: (type==='adjetivo'?'Aquilo que causa ':'Aquele que executa ')+d.toLowerCase()});
        if(document.getElementById('d-a-abstrato')?.checked)
            entries.push({word: verbForm+'ṫi', ipa: verbIpa ? verbIpa+'θi' : '', type: 'substantivo', trans: 'Essência/Ação de '+d});
        if(document.getElementById('d-a-adv-modo')?.checked)
            entries.push({word: verbForm+'iჰa', ipa: verbIpa ? verbIpa+'iksa' : '', type: 'advérbio', trans: 'De forma associada a '+d});

        if(document.getElementById('d-s-coletivo')?.checked)
             entries.push({word: word+'noma', ipa: ipa ? ipa+'noma' : '', type: 'substantivo', trans: 'Conjunto de '+d});
    }

    if(document.getElementById('d-s-plural')?.checked) {
        entries.push({word: word+'s', ipa: ipa ? ipa+'s' : '', type: type, trans: trans + ' (plural)'});
    }

    return entries;
}

function updateDerivOptions() {
    const type = document.getElementById('f-type').value;
    const container = document.getElementById('deriv-options-container');
    if (!type) {
        container.innerHTML = '<span style="color:var(--tx3);font-size:.82rem">Selecione uma classe gramatical para ver as opções...</span>';
        return;
    }
    let html = '';
    if (type === 'verbo') {
        html += `
        <div class="deriv-group">
            <div class="deriv-group-title">Do Verbo para...</div>
            <div class="deriv-grid">
                <label class="cb-wrap"><input type="checkbox" id="d-v-adj-res" onchange="livePreview()"><span class="cb-label">Adjetivo Resultante</span><span class="cb-suf">-λ</span></label>
                <label class="cb-wrap"><input type="checkbox" id="d-v-agente" onchange="livePreview()"><span class="cb-label">Agente</span><span class="cb-suf">-av</span></label>
                <label class="cb-wrap"><input type="checkbox" id="d-v-abstrato" onchange="livePreview()"><span class="cb-label">Abstrato (Conceito)</span><span class="cb-suf">-ṫi</span></label>
                <label class="cb-wrap"><input type="checkbox" id="d-v-adv-modo" onchange="livePreview()"><span class="cb-label">Advérbio de Modo</span><span class="cb-suf">-iჰa</span></label>
            </div>
        </div>`;
    } else if (type === 'adjetivo' || type === 'substantivo') {
        html += `
        <div class="deriv-group">
            <div class="deriv-group-title">Da Raiz para Ação e Derivados...</div>
            <div class="deriv-grid">
                <label class="cb-wrap"><input type="checkbox" id="d-a-verbo" onchange="livePreview()"><span class="cb-label">Verbo (Tornar-se/Ação)</span><span class="cb-suf">-r / -ar</span></label>
                <label class="cb-wrap"><input type="checkbox" id="d-a-adj-res" onchange="livePreview()"><span class="cb-label">Adjetivo Derivado</span><span class="cb-suf">Verbo+-λ</span></label>
                <label class="cb-wrap"><input type="checkbox" id="d-a-agente" onchange="livePreview()"><span class="cb-label">Agente da Ação</span><span class="cb-suf">-av</span></label>
                <label class="cb-wrap"><input type="checkbox" id="d-a-abstrato" onchange="livePreview()"><span class="cb-label">Abstrato da Ação</span><span class="cb-suf">Verbo+-ṫi</span></label>
                <label class="cb-wrap"><input type="checkbox" id="d-a-adv-modo" onchange="livePreview()"><span class="cb-label">Adv. Modo</span><span class="cb-suf">Verbo+-iჰa</span></label>
            </div>
        </div>`;
    } 
    if (type === 'substantivo' || type === 'adjetivo') {
        html += `
        <div class="deriv-group">
            <div class="deriv-group-title">Agrupamento</div>
            <div class="deriv-grid">
                <label class="cb-wrap"><input type="checkbox" id="d-s-coletivo" onchange="livePreview()"><span class="cb-label">Coletivo (Conjunto)</span><span class="cb-suf">-noma</span></label>
            </div>
        </div>`;
    }
    html += `
    <div class="deriv-group">
        <div class="deriv-group-title">Quantidade</div>
        <div class="deriv-grid">
            <label class="cb-wrap"><input type="checkbox" id="d-s-plural" onchange="livePreview()"><span class="cb-label">Plural</span><span class="cb-suf">-s</span></label>
        </div>
    </div>`;

    container.innerHTML = html;
}

function livePreview(){
  const w=document.getElementById('f-word').value.trim();
  const t=document.getElementById('f-trans').value.trim();
  const tp=document.getElementById('f-type').value;
  const ip=document.getElementById('f-ipa').value.trim();
  const prev=document.getElementById('preview');
  if(!w||!t||!tp){
    prev.innerHTML='<span style="color:var(--tx3);font-size:.82rem">Preencha os campos obrigatórios…</span>';
    return;
  }
  const all=[{word: w, ipa: ip, type: tp, trans: t}, ...buildDerivs(w,t,tp,ip)];
  prev.innerHTML='<div class="prev-title">Entradas a salvar na nuvem:</div>'+
    all.map(item=>
      `<span class="prev-chip"><span class="pw">${item.word}</span><span class="ps">${item.type}</span><span class="pt">${item.trans}</span></span>`
    ).join('');
}

// ── CARREGAMENTO DO FIREBASE ──
function loadFromCloud() {
  db.collection("mani_words").onSnapshot((querySnapshot) => {
      D = [];
      querySnapshot.forEach((doc) => {
          let data = doc.data();
          data.id = doc.id;
          D.push(data);
      });
      
      // Regra atualizada: Se tiver menos de 50 palavras, mostra o botão para injetar a base
      if(D.length < 50) document.getElementById('migration-box').style.display = 'block';
      else document.getElementById('migration-box').style.display = 'none';

      sortD(); updateHeaderCount(); buildAlpha(); renderDict();
  }, (error) => {
      toast('Erro ao conectar com a nuvem.', 'err');
  });
}

// ── SALVAR NO FIREBASE ──
async function saveWord(){
  const w=document.getElementById('f-word').value.trim();
  const t=document.getElementById('f-trans').value.trim();
  const tp=document.getElementById('f-type').value;
  const ip=document.getElementById('f-ipa').value.trim();
  
  if(!w || !t || !tp) { toast('Preencha os campos obrigatórios.', 'err'); return; }
  if(D.find(e => e.word === w)) { toast(`"${w}" já existe!`, 'err'); return; }
  
  toast('Salvando...', 'info');
  const all=[{word: w, ipa: ip, type: tp, trans: t}, ...buildDerivs(w,t,tp,ip)];
  
  try {
      const batch = db.batch();
      all.forEach(item => {
          const newDocRef = db.collection("mani_words").doc();
          batch.set(newDocRef, item);
      });
      await batch.commit();
      
      toast(`${all.length} entrada(s) salva(s) na nuvem!`, 'ok');
      
      ['f-word','f-trans','f-ipa'].forEach(id=> document.getElementById(id).value='');
      document.getElementById('f-type').value='';
      updateDerivOptions();
      document.getElementById('preview').innerHTML='<span style="color:var(--tx3);font-size:.82rem">Preencha o formulário para ver…</span>';
  } catch (e) {
      toast('Erro ao salvar na nuvem.', 'err');
  }
}

// ── INTERFACE DO DICIONÁRIO ──
let currentTab='criar', filt='all', alpha=null;
function sw(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('nb-'+t).classList.add('on');
  if(t==='dictionary'){buildAlpha();renderDict();}
}

const FILTERS=[['all','Todos'],['verbo','Verbos'],['substantivo','Substantivos'],['adjetivo','Adjetivos'],['numeral','Numerais'],['outros','Outros']];
function buildFilters(){
  document.getElementById('fr').innerHTML=FILTERS.map(([v,l])=>
    `<button class="fb${v===filt?' on':''}" onclick="setFilt(this,'${v}')">${l}</button>`
  ).join('');
}
function setFilt(btn,f){
  filt=f; alpha=null;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildAlpha(); renderDict();
}

function getFiltered(){
  const q=(document.getElementById('sr')?.value||'').toLowerCase();
  return D.filter(e=>{
    if(filt!=='all'&&filt!=='outros'&&e.type!==filt)return false;
    if(filt==='outros'&&['verbo','substantivo','adjetivo','numeral'].includes(e.type))return false;
    if(alpha&&firstChar(e.word)!==alpha)return false;
    if(q){const nw=nn(e.word);return nw.includes(q)||e.word.toLowerCase().includes(q)||e.trans.toLowerCase().includes(q);}
    return true;
  });
}

function buildAlpha(){
  const present=new Set(getFiltered().map(e=>firstChar(e.word)));
  const all=[...new Set(D.map(e=>firstChar(e.word)))].sort();
  document.getElementById('an').innerHTML=all.map(c=>
    `<button class="ab${present.has(c)?' has':''}${alpha===c?' sel':''}" onclick="selAlpha('${c}')">${c}</button>`
  ).join('');
}
function selAlpha(c){alpha=alpha===c?null:c;buildAlpha();renderDict();}

function typeClass(t){
  const m={verbo:'t-verbo',substantivo:'t-substantivo',adjetivo:'t-adjetivo',
    numeral:'t-numeral',pronome:'t-pronome','partícula':'t-partícula',
    'interjeição':'t-interjeição','conjunção':'t-conjunção','advérbio':'t-advérbio',
    'determinativo':'t-determinativo','interrogativo':'t-interrogativo'};
  return m[t]||'t-default';
}

function renderDict(){
  const fd=getFiltered();
  const dl=document.getElementById('dl');
  const cc=document.getElementById('dcc');
  if(!dl)return;
  if(cc)cc.textContent=`${fd.length} entrada${fd.length!==1?'s':''} na nuvem`;
  if(!fd.length){dl.innerHTML='<div class="nr">Nenhuma entrada encontrada.</div>';return;}
  const q=document.getElementById('sr')?.value||'';
  const groups={};
  fd.forEach(e=>{const l=firstChar(e.word);if(!groups[l])groups[l]=[];groups[l].push(e);});
  
  dl.innerHTML=Object.keys(groups).sort().map(l=>
    `<div class="as">${!q?`<div class="ah">${l}</div>`:''}<div class="de-list">${
      groups[l].map(e=>{
        return `<div class="de" id="de-${e.id}">
          <span class="ew">${e.word}</span>
          <span class="ei">[${e.ipa||'—'}]</span>
          <span class="et ${typeClass(e.type)}">${e.type}</span>
          <span class="ed" id="ed-${e.id}">${e.trans}</span>
          <div class="de-actions">
            <button class="btn-sm btn-edit" onclick="startEdit('${e.id}')">✎</button>
            <button class="btn-sm btn-del" onclick="delEntry('${e.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}</div></div>`
  ).join('');
}

// ── EDIÇÃO COMPLETA E DELETE NO FIREBASE ──
function startEdit(id){
  const row = document.getElementById('de-'+id);
  const entry = D.find(e => e.id === id);
  if(!row || !entry) return;
  
  // Transforma a linha inteira em inputs editáveis
  row.innerHTML=`
    <input class="ed-input" id="ei-w-${id}" value="${entry.word}" style="width:100px; font-weight:bold; color:var(--acc3);">
    <input class="ed-input" id="ei-i-${id}" value="${entry.ipa||''}" placeholder="IPA" style="width:70px;">
    <select class="ed-input" id="ei-t-${id}" style="width:110px;">
        <option value="verbo" ${entry.type==='verbo'?'selected':''}>verbo</option>
        <option value="substantivo" ${entry.type==='substantivo'?'selected':''}>substantivo</option>
        <option value="adjetivo" ${entry.type==='adjetivo'?'selected':''}>adjetivo</option>
        <option value="numeral" ${entry.type==='numeral'?'selected':''}>numeral</option>
        <option value="pronome" ${entry.type==='pronome'?'selected':''}>pronome</option>
        <option value="advérbio" ${entry.type==='advérbio'?'selected':''}>advérbio</option>
        <option value="conjunção" ${entry.type==='conjunção'?'selected':''}>conjunção</option>
        <option value="partícula" ${entry.type==='partícula'?'selected':''}>partícula</option>
        <option value="determinativo" ${entry.type==='determinativo'?'selected':''}>determinativo</option>
        <option value="interjeição" ${entry.type==='interjeição'?'selected':''}>interjeição</option>
        <option value="interrogativo" ${entry.type==='interrogativo'?'selected':''}>interrogativo</option>
    </select>
    <input class="ed-input" id="ei-tr-${id}" value="${entry.trans.replace(/"/g,'&quot;')}" style="flex:1;">
    <div class="de-actions">
      <button class="btn-sm btn-ok" onclick="confirmEdit('${id}')">✓</button>
      <button class="btn-sm btn-cancel" onclick="renderDict()">✕</button>
    </div>`;
}

async function confirmEdit(id){
  const w = document.getElementById('ei-w-'+id)?.value.trim();
  const i = document.getElementById('ei-i-'+id)?.value.trim();
  const t = document.getElementById('ei-t-'+id)?.value;
  const tr = document.getElementById('ei-tr-'+id)?.value.trim();
  
  if(!w || !tr){toast('Palavra e tradução são obrigatórias.','err');return;}
  
  try {
      await db.collection("mani_words").doc(id).update({ word: w, ipa: i, type: t, trans: tr });
      toast('Editado com sucesso!','ok');
  } catch(e) {
      toast('Erro ao editar na nuvem.','err');
  }
}

async function delEntry(id){
  const entry = D.find(e => e.id === id);
  if(!entry) return;
  if(!confirm(`Remover "${entry.word}" permanentemente da nuvem?`)) return;
  
  try {
      await db.collection("mani_words").doc(id).delete();
      toast(`"${entry.word}" removido.`,'info');
  } catch(e) {
      toast('Erro ao remover.', 'err');
  }
}

let toastTimer=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=`toast toast-${type} show`;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

async function migrateBaseData() {
  toast('Iniciando migração (isso pode levar alguns segundos)...', 'info');
  document.getElementById('migration-box').style.display = 'none';
  
  try {
      const batchArrays = [];
      let i = 0;
      const batchSize = 100;
      
      const allObjects = BASE_DATA.map(e => ({ word: e[0], ipa: e[1], type: e[2], trans: e[3] }));
      
      while (i < allObjects.length) {
          batchArrays.push(allObjects.slice(i, i + batchSize));
          i += batchSize;
      }
      
      for (const b of batchArrays) {
          const batch = db.batch();
          b.forEach(item => {
              const docRef = db.collection("mani_words").doc();
              batch.set(docRef, item);
          });
          await batch.commit();
      }
      toast('Migração concluída! O banco está vivo na nuvem.', 'ok');
  } catch (e) {
      toast('Erro na migração.', 'err');
      document.getElementById('migration-box').style.display = 'block';
  }
}
