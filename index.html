<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080812;--s1:#10101e;--s2:#171728;--s3:#1f1f38;
  --acc:#8b6bd4;--acc2:#b08cf0;--acc3:#d4b8ff;
  --tx:#e2e2f0;--tx2:#8888aa;--tx3:#444466;
  --bd:#222238;--bd2:#2e2e50;--bd3:#3a3a60;
  --ok:#3a7a5a;--er:#8a3a3a;
}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#080812 0%,#130d24 40%,#0a1030 100%);border-bottom:1px solid var(--bd2);padding:20px 36px;display:flex;align-items:center;gap:16px}
.logo{font-size:2.4rem;font-weight:900;letter-spacing:-.03em;background:linear-gradient(135deg,var(--acc3) 0%,#80d4ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:.75rem;color:var(--tx2);letter-spacing:.2em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--bd2);border-radius:20px}
.hdr-stat{margin-left:auto;font-size:.78rem;color:var(--tx3);display:flex;align-items:center;gap:6px}
.hdr-stat span{color:var(--acc2);font-weight:700}

/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 36px;display:flex;gap:4px}
.nb{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-size:.95rem;font-family:inherit;cursor:pointer;padding:14px 20px;transition:all .2s}
.nb:hover{color:var(--tx)}
.nb.on{color:var(--acc3);border-bottom-color:var(--acc)}

/* CONTENT */
.content{max-width:1140px;margin:0 auto;padding:32px 36px}
.tab{display:none}.tab.on{display:block}

/* βîÄβîÄ CRIAR PALAVRA βîÄβîÄ */
.cp-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px}
.card-title{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--acc2);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--bd)}

.fg{display:flex;flex-direction:column;gap:14px}
.fl{font-size:.8rem;color:var(--tx2);margin-bottom:5px;display:block}
.fi{width:100%;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--tx3)}
select.fi option{background:var(--s2)}

.deriv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cb-wrap{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:border-color .2s}
.cb-wrap:hover{border-color:var(--acc)}
.cb-wrap input{width:15px;height:15px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.cb-wrap .cb-label{font-size:.82rem;color:var(--tx2)}
.cb-wrap .cb-suf{font-size:.78rem;color:var(--acc2);margin-left:auto;font-family:monospace}

.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:9px;font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-save{background:linear-gradient(135deg,var(--acc),#7c4fcc);color:#fff;box-shadow:0 2px 16px rgba(139,107,212,.3)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,107,212,.5)}
.btn-export{background:var(--s2);border:1px solid var(--bd2);color:var(--tx2)}
.btn-export:hover{border-color:var(--acc);color:var(--tx)}
.btn-reset{background:var(--s2);border:1px solid var(--er);color:#e88080}
.btn-reset:hover{background:rgba(138,58,58,.15)}
.btn-sm{padding:4px 10px;font-size:.75rem;border-radius:6px;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-edit{background:rgba(139,107,212,.12);border:1px solid rgba(139,107,212,.25);color:var(--acc2)}
.btn-edit:hover{background:rgba(139,107,212,.25);color:var(--acc3)}
.btn-del{background:rgba(138,58,58,.1);border:1px solid rgba(138,58,58,.25);color:#e88080}
.btn-del:hover{background:rgba(138,58,58,.2)}
.btn-ok{background:rgba(58,122,90,.2);border:1px solid rgba(58,122,90,.4);color:#80d4a8}
.btn-ok:hover{background:rgba(58,122,90,.35)}
.btn-cancel{background:rgba(80,80,100,.15);border:1px solid var(--bd);color:var(--tx2)}
.btn-cancel:hover{background:rgba(80,80,100,.3)}

/* Preview */
.preview{min-height:60px}
.prev-title{font-size:.75rem;color:var(--tx3);margin-bottom:10px}
.prev-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--s3);border:1px solid var(--bd2);border-radius:20px;font-size:.82rem;margin:3px}
.prev-chip .pw{color:var(--acc3);font-weight:700}
.prev-chip .pt{color:var(--tx2)}
.prev-chip .ps{font-size:.7rem;color:var(--acc);font-family:monospace}

/* Toast */
.toast{position:fixed;bottom:28px;right:28px;padding:12px 20px;border-radius:10px;font-size:.88rem;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast-ok{background:rgba(58,122,90,.95);border:1px solid rgba(80,180,120,.4);color:#c0f0d8}
.toast-err{background:rgba(138,58,58,.95);border:1px solid rgba(220,100,100,.4);color:#f0c0c0}
.toast-info{background:rgba(58,80,138,.95);border:1px solid rgba(100,140,220,.4);color:#c0d4f8}

.dc-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.sr-wrap{position:relative}
.sr-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--tx2);pointer-events:none;font-size:.9rem}
#sr{width:100%;padding:12px 14px 12px 40px;background:var(--s2);border:1px solid var(--bd);border-radius:11px;color:var(--tx);font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s}
#sr:focus{border-color:var(--acc)}
#sr::placeholder{color:var(--tx2)}
.fr{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:6px 15px;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);border-radius:20px;cursor:pointer;font-size:.83rem;font-family:inherit;transition:all .2s}
.fb:hover{border-color:var(--acc);color:var(--tx)}
.fb.on{background:var(--acc);border-color:var(--acc);color:#fff}

.ab{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:none;border:none;border-radius:5px;color:var(--tx3);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .15s}
.ab.has{color:var(--acc2)}.ab.has:hover{background:var(--s3);color:var(--tx)}
.ab.sel{background:var(--acc);color:#fff}

.dc-count{font-size:.78rem;color:var(--tx3);margin-bottom:8px}
.as{margin-bottom:20px}
.ah{font-size:1.1rem;font-weight:700;color:var(--acc3);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.de-list{display:flex;flex-direction:column;gap:5px}
.de{background:var(--s1);border:1px solid var(--bd);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color .2s;flex-wrap:wrap}

.ew{font-size:.95rem;font-weight:700;color:var(--acc3);min-width:120px}
.ei{font-size:.75rem;color:var(--tx3);font-style:italic;min-width:100px}

.ed-input{flex:1;min-width:140px;padding:4px 9px;background:var(--s3);border:1px solid var(--acc);border-radius:6px;color:var(--tx);font-size:.85rem;font-family:inherit;outline:none}

  .content { padding: 20px 14px; }

// βîÄβîÄ GERAΟ΅ΟÉO DE DERIVAΟ΅ΟïES AUTOMΟ¹TICAS E PLURAIS βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function generateDerivatives(base){
  const result=[...base];
  const exists=new Set(base.map(e=>e[0]));
  const add=e=>{if(!exists.has(e[0])){result.push(e);exists.add(e[0]);}};

  // 1. DerivaΟßΟΒes (AΟßΟΘo->Estado / Qualidade->AΟßΟΘo / etc)
  base.forEach(([w,ip,tp,df])=>{
    const d=df.toLowerCase().split(',')[0].split(';')[0].trim();
    const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
    const ipaBase = ip ? ip.replace(/r$/, '') : '';

    if(tp==='verbo'){
      const st=w.replace(/r$/,'');
      add([w+'ΈΜ',       ip?ip+'αΚΫ':'','adjetivo',    cap(d)+'; estado resultante']);
      add([st+'av',     ipaBase?ipaBase+'av':'','substantivo', 'Aquele que '+d]);
      add([w+'αΙΪi',      ip?ip+'ΈΗi':'','substantivo', 'O conceito de '+d]);
      add([w+'iαÉΑa',     ip?ip+'iksa':'','advΟ©rbio',    'De modo: '+d]);
    }

    if(tp==='substantivo' || tp==='adjetivo'){
      add([w+'noma',    ip?ip+'noma':'','substantivo', 'Conjunto de '+d]);
    }

    if(tp==='adjetivo'){
      const isVow=/[aeiou…¦…îΈΜ…ê]$/i.test(w);
      const vb=isVow?w+'r':w+'ar';
      const verbIpa = ip ? (isVow ? ip+'r' : ip+'ar') : '';
      const st=vb.replace(/r$/,'');
      const verbTrans = 'Tornar-se '+d;

      add([vb,          verbIpa,'verbo',       verbTrans]);
      add([vb+'ΈΜ',      verbIpa?verbIpa+'αΚΫ':'','adjetivo',    cap(d)+'; estado derivado']);
      add([st+'av',     verbIpa?verbIpa.replace(/r$/,'')+'av':'','substantivo', 'Aquilo que '+verbTrans.toLowerCase()]);
      add([vb+'αΙΪi',     verbIpa?verbIpa+'ΈΗi':'','substantivo', 'A essΟΣncia de '+d]);
      add([vb+'iαÉΑa',    verbIpa?verbIpa+'iksa':'','advΟ©rbio',    'De forma '+d]);
    }
  });

  // 2. PluralizaΟßΟΘo Universal
  const current = [...result];
  current.forEach(([w, ip, tp, df])=>{
    if(['substantivo', 'adjetivo', 'determinativo'].includes(tp) && !w.endsWith('s')){
       add([w+'s', ip?ip+'s':'', tp, df + ' (Plural)']);
    }
  });

  return result;
}

// βîÄβîÄ PERSISTΟäNCIA βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
const LS_KEY='maniDict_v2';
let D=[];

function loadData(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){D=JSON.parse(raw);return;}
  }catch(e){}
  
  // CORREΟ΅ΟÉO AQUI: Garante que os derivados e os plurais sejam gerados na primeira vez!
  D=generateDerivatives(BASE_DATA); 
  saveLS();
}
function saveLS(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(D));}catch(e){}
}

// βîÄβîÄ NORMALIZAΟ΅ΟÉO βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function nn(s){
  return s.toLowerCase()
    .replace(/[ΈΜ]/g,'a').replace(/[…¦ΈΒ]/g,'e').replace(/[…î]/g,'o')
    .replace(/[αÉ½]/g,'ch').replace(/[αΙΪ]/g,'th').replace(/[αÉΑ]/g,'ks')
    .replace(/[αÉ†]/g,'r').replace(/…êΧÉ/g,'a').replace(/[ £]/g,'j')
    .replace(/[ ¹]/g,'r').replace(/[ É]/g,'ch').replace(/[ΈΗ]/g,'th')
    .replace(/[…ê]/g,'a').replace(/[…Ψ]/g,'r');
}
function sortD(){D.sort((a,b)=>nn(a[0]).localeCompare(nn(b[0]),'pt'));}
function firstChar(w){return nn(w)[0].toUpperCase();}
function updateHeaderCount(){
  const el=document.getElementById('total-count');
  if(el)el.textContent=D.length;
}

// βîÄβîÄ DERIVAΟ΅ΟÉO DO FORMULΟ¹RIO βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function getBase(word,type){
  return type==='verbo'?word.replace(/r$/,''):word;
}
function buildDerivs(word,trans,type,ipa){
  const b=getBase(word,type);
  const bi=ipa?getBase(ipa,type):'';
  const entries=[];
  if(document.getElementById('d-noma').checked)
    entries.push([b+'noma',bi?bi+'noma':'','substantivo','Conjunto de '+trans.toLowerCase()]);
  if(document.getElementById('d-ti').checked)
    entries.push([b+'αΙΪi',bi?bi+'ΈΗi':'','substantivo','Conceito de '+trans.toLowerCase()]);
  if(document.getElementById('d-av').checked)
    entries.push([b+'av',bi?bi+'av':'','substantivo','Aquele que '+trans.toLowerCase()]);
  if(document.getElementById('d-lam').checked)
    entries.push([b+'ΈΜ',bi?bi+'…êΧÉ':'','adjetivo','Relativo a '+trans.toLowerCase()]);
  if(document.getElementById('d-isha').checked)
    entries.push([b+'iαÉΑa',bi?bi+'iksa':'','advΟ©rbio','De modo '+trans.toLowerCase()]);
  return entries;
}

// βîÄβîÄ PREVIEW βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function livePreview(){
  const w=document.getElementById('f-word').value.trim();

// βîÄβîÄ SALVAR βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function saveWord(){
  const w=document.getElementById('f-word').value.trim();
  const t=document.getElementById('f-trans').value.trim();
  const tp=document.getElementById('f-type').value;
  const ip=document.getElementById('f-ipa').value.trim();
  if(!w){toast('Preencha a palavra em Mani.','err');return;}
  if(!t){toast('Preencha a traduΟßΟΘo.','err');return;}
  if(!tp){toast('Selecione a classe gramatical.','err');return;}
  const dup=D.find(e=>e[0]===w);
  if(dup){toast(`"${w}" jΟΓ existe no dicionΟΓrio.`,'err');return;}
  const all=[[w,ip,tp,t],...buildDerivs(w,t,tp,ip)];
  all.forEach(e=>D.push(e));
  sortD();saveLS();updateHeaderCount();
  buildAlpha();renderDict();
  const n=all.length;
  toast(`${n} entrada${n>1?'s':''} adicionada${n>1?'s':''}!`,'ok');
  // Limpar form
  ['f-word','f-trans','f-ipa'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f-type').value='';
  ['d-noma','d-ti','d-av','d-lam','d-isha'].forEach(id=>{document.getElementById(id).checked=false;});
  document.getElementById('preview').innerHTML='<span style="color:var(--tx3);font-size:.82rem">Preencha o formulΟΓrio para verβÄΠ</span>';
}

// βîÄβîÄ EXPORT βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function exportDict(){
  const lines=D.map(e=>`  ${JSON.stringify(e)}`).join(',\n');
  const code=`let D=[\n${lines}\n];`;
  navigator.clipboard.writeText(code).then(()=>toast('CΟ≥digo JS copiado!','info'))
    .catch(()=>toast('Falha ao copiar.','err'));
}

// βîÄβîÄ RESET βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function resetDict(){
  if(!confirm('Isso apagarΟΓ todas as entradas personalizadas e restaurarΟΓ o dicionΟΓrio original. Continuar?'))return;
  
  // CORREΟ΅ΟÉO AQUI TAMBΟâM: Quando reseta, ele roda toda a fΟΓbrica de plurais!
  D=generateDerivatives(BASE_DATA);
  sortD();saveLS();updateHeaderCount();
  buildAlpha();renderDict();
  toast('DicionΟΓrio restaurado e plurais gerados!','info');
}

// βîÄβîÄ TAB SWITCH βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
let currentTab='criar',filt='all',alpha=null;
function sw(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('nb-'+t).classList.add('on');
  if(t==='dictionary'){buildAlpha();renderDict();}
}

// βîÄβîÄ FILTROS βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
const FILTERS=[['all','Todos'],['verbo','Verbos'],['substantivo','Substantivos'],
  ['adjetivo','Adjetivos'],['numeral','Numerais'],['outros','Outros']];
function buildFilters(){
  document.getElementById('fr').innerHTML=FILTERS.map(([v,l])=>
    `<button class="fb${v===filt?' on':''}" onclick="setFilt(this,'${v}')">${l}</button>`
  ).join('');
}
function setFilt(btn,f){
  filt=f;alpha=null;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildAlpha();renderDict();
}

function getFiltered(){
  const q=(document.getElementById('sr')?.value||'').toLowerCase();
  return D.filter(([w,,t,d])=>{
    if(filt!=='all'&&filt!=='outros'&&t!==filt)return false;
    if(filt==='outros'&&['verbo','substantivo','adjetivo','numeral'].includes(t))return false;
    if(alpha&&firstChar(w)!==alpha)return false;
    if(q){const nw=nn(w);return nw.includes(q)||w.toLowerCase().includes(q)||d.toLowerCase().includes(q);}
    return true;
  });
}

function buildAlpha(){
  const present=new Set(getFiltered().map(e=>firstChar(e[0])));
  const all=[...new Set(D.map(e=>firstChar(e[0])))].sort();
  document.getElementById('an').innerHTML=all.map(c=>
    `<button class="ab${present.has(c)?' has':''}${alpha===c?' sel':''}" onclick="selAlpha('${c}')">${c}</button>`
  ).join('');
}
function selAlpha(c){alpha=alpha===c?null:c;buildAlpha();renderDict();}

// βîÄβîÄ RENDER DICT βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function typeClass(t){
  const m={verbo:'t-verbo',substantivo:'t-substantivo',adjetivo:'t-adjetivo',
    numeral:'t-numeral',pronome:'t-pronome','partΟ≠cula':'t-partΟ≠cula',
    'interjeiΟßΟΘo':'t-interjeiΟßΟΘo','conjunΟßΟΘo':'t-conjunΟßΟΘo','advΟ©rbio':'t-advΟ©rbio',
    'determinativo':'t-determinativo','interrogativo':'t-interrogativo'};
  return m[t]||'t-default';
}

function renderDict(){
  const fd=getFiltered();
  const dl=document.getElementById('dl');
  const cc=document.getElementById('dcc');
  if(!dl)return;
  if(cc)cc.textContent=`${fd.length} entrada${fd.length!==1?'s':''} encontrada${fd.length!==1?'s':''}`;
  if(!fd.length){dl.innerHTML='<div class="nr">Nenhuma entrada encontrada.</div>';return;}
  const q=document.getElementById('sr')?.value||'';
  const groups={};
  fd.forEach(e=>{const l=firstChar(e[0]);if(!groups[l])groups[l]=[];groups[l].push(e);});
  dl.innerHTML=Object.keys(groups).sort().map(l=>
    `<div class="as">${!q?`<div class="ah">${l}</div>`:''}<div class="de-list">${
      groups[l].map(([w,ip,t,d])=>{
        const idx=D.findIndex(e=>e[0]===w&&e[2]===t);
        return `<div class="de" id="de-${idx}">
          <span class="ew">${w}</span>
          <span class="ei">[${ip||'βÄî'}]</span>
          <span class="et ${typeClass(t)}">${t}</span>
          <span class="ed" id="ed-${idx}">${d}</span>
          <div class="de-actions">
            <button class="btn-sm btn-edit" onclick="startEdit(${idx})">β€é</button>
            <button class="btn-sm btn-del" onclick="delEntry(${idx})">β€ï</button>
          </div>
        </div>`;
      }).join('')}</div></div>`
  ).join('');
}

// βîÄβîÄ EDIΟ΅ΟÉO INLINE βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function startEdit(idx){
  const edEl=document.getElementById('ed-'+idx);
  const deEl=document.getElementById('de-'+idx);
  if(!edEl||!D[idx])return;
  const cur=D[idx][3];
  edEl.innerHTML=`<input class="ed-input" id="ei-${idx}" value="${cur.replace(/"/g,'&quot;')}">`;
  const actionsEl=deEl.querySelector('.de-actions');
  actionsEl.innerHTML=`
    <button class="btn-sm btn-ok" onclick="confirmEdit(${idx})">β€™</button>
    <button class="btn-sm btn-cancel" onclick="renderDict()">β€ï</button>`;
  const inp=document.getElementById('ei-'+idx);
  inp.focus();inp.select();
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter')confirmEdit(idx);
    if(e.key==='Escape')renderDict();
  });
}
function confirmEdit(idx){
  const inp=document.getElementById('ei-'+idx);
  if(!inp||!D[idx])return;
  const val=inp.value.trim();
  if(!val){toast('A traduΟßΟΘo nΟΘo pode estar vazia.','err');return;}
  D[idx][3]=val;
  saveLS();renderDict();
  toast('Entrada atualizada!','ok');
}

// βîÄβîÄ DELETE βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
function delEntry(idx){
  const w=D[idx]?.[0];
  if(!w)return;
  if(!confirm(`Remover "${w}" do dicionΟΓrio?`))return;
  D.splice(idx,1);
  saveLS();updateHeaderCount();buildAlpha();renderDict();
  toast(`"${w}" removido.`,'info');
}

// βîÄβîÄ TOAST βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
let toastTimer=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className=`toast toast-${type} show`;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// βîÄβîÄ INIT βîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄβîÄ
loadData();sortD();
buildFilters();buildAlpha();renderDict();updateHeaderCount();
</script>
