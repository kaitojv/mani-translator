<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080812;--s1:#10101e;--s2:#171728;--s3:#1f1f38;
  --acc:#8b6bd4;--acc2:#b08cf0;--acc3:#d4b8ff;
  --tx:#e2e2f0;--tx2:#8888aa;--tx3:#44446688;
  --bd:#222238;--bd2:#2e2e50;
  --vb:#3a6fa8;--no:#4a9970;--adj:#9a4a3a;--num:#8a7a3a;--other:#4a4a8a;
}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{
  background:linear-gradient(135deg,#080812 0%,#130d24 40%,#0a1030 100%);
  border-bottom:1px solid var(--bd2);
  padding:20px 36px;display:flex;align-items:center;gap:20px;
}
.logo-wrap{display:flex;align-items:baseline;gap:10px}
.logo{
  font-size:2.4rem;font-weight:900;letter-spacing:-0.03em;
  background:linear-gradient(135deg,var(--acc3) 0%,#80d4ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:.75rem;color:var(--tx2);letter-spacing:.2em;text-transform:uppercase;padding:3px 10px;border:1px solid var(--bd2);border-radius:20px}

/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 36px;display:flex;gap:4px}
.nb{
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--tx2);font-size:.95rem;font-family:inherit;cursor:pointer;
  padding:14px 20px;transition:all .2s;
}
.nb:hover{color:var(--tx)}
.nb.on{color:var(--acc3);border-bottom-color:var(--acc)}

/* CONTENT */
.content{max-width:1140px;margin:0 auto;padding:32px 36px}
.tab{display:none}.tab.on{display:block}

/* === TRANSLATOR === */
.tr-wrap{display:flex;flex-direction:column;gap:18px}
.dir-row{display:flex;align-items:center;gap:10px}
.dir-seg{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:4px;display:flex;gap:2px}
.db{background:none;border:none;color:var(--tx2);padding:8px 18px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.88rem;transition:all .2s}
.db.on{background:var(--acc);color:#fff;box-shadow:0 2px 12px rgba(139,107,212,.4)}
.hint{font-size:.78rem;color:var(--tx3)}

.panels{display:grid;grid-template-columns:1fr 56px 1fr;border:1px solid var(--bd);border-radius:14px;overflow:hidden;background:var(--s1);min-height:260px}
.pn{display:flex;flex-direction:column}
.pn-hdr{padding:12px 18px;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tx2);background:var(--s2);border-bottom:1px solid var(--bd)}
.pn-ta{flex:1;background:none;border:none;padding:18px;color:var(--tx);font-size:1.05rem;font-family:inherit;resize:none;outline:none;line-height:1.65}
.pn-ta::placeholder{color:var(--bd2)}
.pn-out{flex:1;padding:18px;font-size:1.05rem;line-height:1.65;min-height:180px}
.ph{color:var(--tx3);font-size:.95rem}
.tr-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--s2);border-left:1px solid var(--bd);border-right:1px solid var(--bd);gap:10px;padding:12px 6px}
.tr-btn{
  background:linear-gradient(135deg,var(--acc),#7c4fcc);border:none;color:#fff;
  width:40px;height:100px;border-radius:10px;cursor:pointer;font-family:inherit;
  font-size:.8rem;font-weight:700;writing-mode:vertical-rl;letter-spacing:.05em;
  transition:all .2s;display:flex;align-items:center;justify-content:center;
}
.tr-btn:hover{transform:scaleY(1.04);box-shadow:0 0 18px rgba(139,107,212,.5)}
.tr-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.spin{width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--acc2);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.ld{display:flex;align-items:center;gap:8px;color:var(--tx2);font-size:.9rem}
.tr-res{white-space:pre-wrap;color:var(--tx)}
.gn{margin-top:14px;padding:10px 14px;background:rgba(139,107,212,.1);border:1px solid rgba(139,107,212,.25);border-radius:8px;font-size:.82rem;color:var(--tx2)}
.err{color:#e88080;font-size:.9rem}

/* === DICTIONARY === */
.dc-wrap{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.sr-wrap{position:relative}
.sr-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--tx2);pointer-events:none}
#sr{width:100%;padding:13px 14px 13px 42px;background:var(--s2);border:1px solid var(--bd);border-radius:11px;color:var(--tx);font-size:.98rem;font-family:inherit;outline:none;transition:border-color .2s}
#sr:focus{border-color:var(--acc)}
#sr::placeholder{color:var(--tx2)}
.fr{display:flex;gap:7px;flex-wrap:wrap}
.fb{padding:6px 15px;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);border-radius:20px;cursor:pointer;font-size:.83rem;font-family:inherit;transition:all .2s}
.fb:hover{border-color:var(--acc);color:var(--tx)}
.fb.on{background:var(--acc);border-color:var(--acc);color:#fff}

.an{display:flex;flex-wrap:wrap;gap:3px;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;margin-bottom:20px}
.ab{width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:none;border:none;border-radius:5px;color:var(--bd2);font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .15s}
.ab.has{color:var(--acc2)}.ab.has:hover{background:var(--s3);color:var(--tx)}
.ab.sel{background:var(--acc);color:#fff}

.dc-count{font-size:.8rem;color:var(--tx2);margin-bottom:10px}
.as{margin-bottom:22px}
.ah{font-size:1.15rem;font-weight:700;color:var(--acc3);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.de-list{display:flex;flex-direction:column;gap:6px}
.de{
  background:var(--s1);border:1px solid var(--bd);border-radius:9px;
  padding:12px 16px;display:flex;align-items:baseline;gap:11px;
  transition:border-color .2s;flex-wrap:wrap;
}
.de:hover{border-color:var(--acc)}
.ew{font-size:1rem;font-weight:700;color:var(--acc3);min-width:130px}
.ei{font-size:.78rem;color:var(--tx2);font-style:italic;min-width:110px}
.et{font-size:.7rem;padding:2px 9px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.t-verbo{background:rgba(58,111,168,.18);color:#7ab0e8;border:1px solid rgba(58,111,168,.3)}
.t-substantivo{background:rgba(74,153,112,.18);color:#80d4a8;border:1px solid rgba(74,153,112,.3)}
.t-adjetivo{background:rgba(154,74,58,.18);color:#e89a80;border:1px solid rgba(154,74,58,.3)}
.t-numeral{background:rgba(138,122,58,.18);color:#e8d480;border:1px solid rgba(138,122,58,.3)}
.t-pronome{background:rgba(123,58,154,.18);color:#c48ae8;border:1px solid rgba(123,58,154,.3)}
.t-partícula,.t-interrogativo{background:rgba(58,138,154,.18);color:#80c8d4;border:1px solid rgba(58,138,154,.3)}
.t-interjeição{background:rgba(154,100,58,.18);color:#e8b880;border:1px solid rgba(154,100,58,.3)}
.t-conjunção{background:rgba(80,80,120,.18);color:#b0b0e0;border:1px solid rgba(80,80,120,.3)}
.t-advérbio{background:rgba(60,120,80,.18);color:#90d4a8;border:1px solid rgba(60,120,80,.3)}
.t-determinativo{background:rgba(100,60,120,.18);color:#c090e0;border:1px solid rgba(100,60,120,.3)}
.t-default{background:rgba(80,80,100,.18);color:#aaaacc;border:1px solid rgba(80,80,100,.3)}
.ed{font-size:.88rem;color:var(--tx2);flex:1;min-width:180px}
.nr{text-align:center;padding:40px;color:var(--tx2);font-size:.95rem}

@media(max-width:720px){
  .hdr{padding:14px 18px}.nav{padding:0 14px}
  .content{padding:18px 14px}
  .panels{grid-template-columns:1fr}
  .tr-mid{flex-direction:row;padding:10px 14px;border:none;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd)}
  .tr-btn{writing-mode:horizontal-tb;width:120px;height:38px}
  .ew{min-width:100px}.ei{min-width:80px}
}
</style>

  <header class="hdr">
    <div class="logo-wrap">
      <div class="logo">Mani</div>

  <nav class="nav">
    <button class="nb on" id="nb-translator" onclick="sw('translator')">⟷ Tradutor</button>

            <div class="pn-out" id="out"><span class="ph">A tradução aparecerá aqui…</span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- DICTIONARY -->
    <section class="tab" id="tab-dictionary">
      <div class="dc-wrap">

      </div>
      <div class="an" id="an"></div>
      <div class="dc-count" id="dcc"></div>
      <div id="dl"></div>
    </section>
  </div>
</div>

// ── SORT ────────────────────────────────────────────────────
function nn(s){
  return s.toLowerCase()
    .replace(/[λ]/g,'a').replace(/[ɛε]/g,'e').replace(/[ɔ]/g,'o')
    .replace(/[თ]/g,'ch').replace(/[ṫ]/g,'th').replace(/[ჰ]/g,'ks')
    .replace(/[რ]/g,'r').replace(/ɐ̃/g,'a').replace(/[ʒ]/g,'j')
    .replace(/[ʁ]/g,'r').replace(/[ʃ]/g,'ch').replace(/[θ]/g,'th')
    .replace(/[ɐ]/g,'a').replace(/[ɾ]/g,'r');
}
D.sort((a,b)=>nn(a[0]).localeCompare(nn(b[0]),'pt'));

let tab='translator',dir='pt-mani',filt='all',alpha=null,busy=false;

// ── TAB SWITCH ──────────────────────────────────────────────
function sw(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('nb-'+t).classList.add('on');
  if(t==='dictionary'){buildAlpha();renderDict();}
}

// ── DIRECTION ───────────────────────────────────────────────
function setDir(d){
  dir=d;
  document.querySelectorAll('.db').forEach(x=>x.classList.remove('on'));
  document.getElementById('dir-'+d).classList.add('on');
  const isPT=d==='pt-mani';
  document.getElementById('lbl-in').textContent=isPT?'Português':'Mani';
  document.getElementById('lbl-out').textContent=isPT?'Mani':'Português';
  document.getElementById('inp').placeholder=isPT?'Digite em Português…':'Digite em Mani…';
  document.getElementById('out').innerHTML='<span class="ph">A tradução aparecerá aqui…</span>';
}

// ── TRANSLATE ────────────────────────────────────────────────
async function translate(){
  const txt=document.getElementById('inp').value.trim();
  if(!txt||busy)return;
  busy=true;
  const btn=document.getElementById('trbtn');
  btn.disabled=true;btn.textContent='…';
  document.getElementById('out').innerHTML='<div class="ld"><div class="spin"></div>Traduzindo…</div>';

  try{
    // Faz a chamada para o seu arquivo traduzir.py na Vercel
    const r=await fetch("/api/traduzir", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ 
        texto: txt,
        direcao: dir 
      })
    });
    
    const data=await r.json();
    if(data.erro) throw new Error(data.erro);

    const full=data.traducao||'';
    const pts=full.split('---');
    const tr=pts[0].trim();
    const note=pts[1]?.trim();
    
    let html=`<div class="tr-res">${tr}</div>`;
    if(note)html+=`<div class="gn">📐 ${note}</div>`;
    document.getElementById('out').innerHTML=html;
    
  }catch(e){
    console.error(e);
    document.getElementById('out').innerHTML='<div class="err">Erro de conexão. Verifique o servidor.</div>';
  }
  
  busy=false;btn.disabled=false;btn.textContent='Traduzir';
}

const FILTERS=[
  ['all','Todos'],['verbo','Verbos'],['substantivo','Substantivos'],
  ['adjetivo','Adjetivos'],['numeral','Numerais'],['outros','Outros']
];
function buildFilters(){
  document.getElementById('fr').innerHTML=FILTERS.map(([v,l])=>
    `<button class="fb ${v===filt?'on':''}" onclick="setFilt(this,'${v}')">${l}</button>`
  ).join('');
}
function setFilt(btn,f){
  filt=f;alpha=null;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildAlpha();renderDict();
}

function firstChar(w){return nn(w)[0].toUpperCase();}
function allChars(){return[...new Set(D.map(e=>firstChar(e[0])))].sort();}

function buildAlpha(){
  const chars=allChars();
  document.getElementById('an').innerHTML=chars.map(c=>
    `<button class="ab has ${alpha===c?'sel':''}" onclick="selAlpha('${c}')">${c}</button>`
  ).join('');
}
function selAlpha(c){
  alpha=alpha===c?null:c;
  buildAlpha();renderDict();
}

function getFiltered(){
  const q=(document.getElementById('sr')?.value||'').toLowerCase();
  return D.filter(([w,,t,d])=>{
    if(filt!=='all'&&filt!=='outros'){if(t!==filt)return false;}
    if(filt==='outros'&&['verbo','substantivo','adjetivo','numeral'].includes(t))return false;
    if(alpha&&firstChar(w)!==alpha)return false;
    if(q){const nw=nn(w);return nw.includes(q)||w.toLowerCase().includes(q)||d.toLowerCase().includes(q);}
    return true;
  });
}

function typeClass(t){
  const m={verbo:'t-verbo',substantivo:'t-substantivo',adjetivo:'t-adjetivo',
    numeral:'t-numeral',pronome:'t-pronome','partícula':'t-partícula',
    'interjeição':'t-interjeição','conjunção':'t-conjunção','advérbio':'t-advérbio',
    'determinativo':'t-determinativo','interrogativo':'t-interrogativo'};
  return m[t]||'t-default';
}

function renderDict(){
  const fd=getFiltered();
  const dl=document.getElementById('dl');
  const cc=document.getElementById('dcc');
  if(!dl)return;
  if(cc)cc.textContent=`${fd.length} entrada${fd.length!==1?'s':''} encontrada${fd.length!==1?'s':''}`;
  if(!fd.length){dl.innerHTML='<div class="nr">Nenhuma entrada encontrada.</div>';return;}

  const q=document.getElementById('sr')?.value||'';
  const groups={};
  fd.forEach(e=>{const l=firstChar(e[0]);if(!groups[l])groups[l]=[];groups[l].push(e);});

  dl.innerHTML=Object.keys(groups).sort().map(l=>
    `<div class="as">${!q?`<div class="ah">${l}</div>`:''}
    <div class="de-list">${groups[l].map(([w,ip,t,d])=>
      `<div class="de">
        <span class="ew">${w}</span>
        <span class="ei">[${ip}]</span>
        <span class="et ${typeClass(t)}">${t}</span>
        <span class="ed">${d}</span>
      </div>`).join('')}</div></div>`
  ).join('');
}

buildFilters();
buildAlpha();
renderDict();
</script>
